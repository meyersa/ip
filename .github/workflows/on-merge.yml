name: On Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish runtime image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' pyproject.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set runtime image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish runtime target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max,ignore-error=true
          platforms: linux/amd64,linux/arm64/v8

  update-deployment:
    name: Open deployment PR
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: meyersa/iac-cd
          token: ${{ secrets.IAC_CD_TOKEN }}
          path: iac-cd

      - name: Find and update deployment image
        id: image
        working-directory: iac-cd
        shell: bash
        env:
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"

          mapfile -t manifests < <(
            git grep -l -F "$IMAGE_REPOSITORY:" -- '*.yml' '*.yaml' || true
          )

          if (( ${#manifests[@]} == 0 )); then
            echo "No YAML manifest references $IMAGE_REPOSITORY" >&2
            exit 1
          fi

          search_repository="${IMAGE_REPOSITORY//./\\.}"
          sed -i -E \
            "s|${search_repository}:[^[:space:]\"']+|${IMAGE}|g" \
            "${manifests[@]}"

          git grep -n -F "$IMAGE" -- "${manifests[@]}"
          echo "short-sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Create deployment pull request
        working-directory: iac-cd
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.IAC_CD_TOKEN }}
          IMAGE: ${{ steps.image.outputs.image }}
          SHORT_SHA: ${{ steps.image.outputs.short-sha }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image_name="${GITHUB_REPOSITORY#*/}"
          branch="deploy/${image_name}-${SHORT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -u
          git commit -m "deploy ${image_name} ${SHORT_SHA}"
          git push origin "$branch"

          gh pr create \
            --repo meyersa/iac-cd \
            --base main \
            --head "$branch" \
            --title "Deploy ${image_name} ${SHORT_SHA}" \
            --body "Updates ${IMAGE} from ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${SOURCE_SHA}." \
            --label automerge
