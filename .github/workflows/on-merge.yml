name: On Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish runtime image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' pyproject.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set runtime image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish runtime target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max,ignore-error=true
          platforms: linux/amd64,linux/arm64/v8

  update-deployment:
    name: Open deployment PR
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: meyersa/iac-cd
          token: ${{ secrets.IAC_CD_TOKEN }}
          path: iac-cd

      - name: Update whoami image
        id: image
        working-directory: iac-cd
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          grep -q '^[[:space:]]*image:' applications/compose.whoami.yml
          sed -i "s|^[[:space:]]*image:.*|      image: $IMAGE|" applications/compose.whoami.yml
          grep -F "image: $IMAGE" applications/compose.whoami.yml
          echo "short-sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Create deployment pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.IAC_CD_TOKEN }}
          path: iac-cd
          base: main
          branch: deploy/app-ivt-py
          delete-branch: true
          labels: automerge
          add-paths: applications/compose.whoami.yml
          commit-message: "deploy app-ivt-py ${{ steps.image.outputs.short-sha }}"
          title: "Deploy app-ivt-py ${{ steps.image.outputs.short-sha }}"
          body: |
            Updates `whoami-frontend` to the image built from
            [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).
