name: On Push

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  filesystem-scan:
    name: Scan repository filesystem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  test:
    name: Validate test target
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: test
          cache-from: type=gha,scope=test
          cache-to: type=gha,scope=test,mode=max,ignore-error=true

  image-scan:
    name: Scan ${{ matrix.target }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - dev
          - runtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: app-ivt-py:ci-${{ matrix.target }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,scope=${{ matrix.target }},mode=max,ignore-error=true

      - name: Scan ${{ matrix.target }} image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app-ivt-py:ci-${{ matrix.target }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
