name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  docker:
    name: Build, validate, scan, and publish image
    runs-on: ubuntu-latest
    needs: codeql
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: dev
          load: true
          tags: ghcr.io/${{ github.repository }}:ci-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan dev image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:ci-dev
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Build test target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build runtime target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          load: true
          tags: ghcr.io/${{ github.repository }}:ci-runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Scan runtime image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:ci-runtime
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Set runtime image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish runtime target
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          platforms: linux/amd64,linux/arm64/v8
